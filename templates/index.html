<!DOCTYPE html>
<html>
<head>
    <title>Stage Manager Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header id="app-header" class="card">
    <div class="header-grid">
        <div class="header-left">
            <div class="split-import" id="split-import">
                <div id="import-default" class="import-btn import-main" aria-hidden="true">Import</div>
                <button id="import-menu-toggle" type="button" class="import-btn import-arrow" aria-haspopup="true" aria-expanded="false" title="Choose import type">
                    <span aria-hidden="true">▼</span>
                </button>
                <div id="import-menu" class="import-menu hidden" role="menu">
                    <button type="button" class="menu-item" data-import-type="script" role="menuitem">Import Script File</button>
                    <button type="button" class="menu-item" data-import-type="cue" role="menuitem">Import Cue List File</button>
                </div>
            </div>
            <div id="selected-files" class="selected-files">
                Script: <span id="selected-script-name">{{ current_script_name }}</span> | Cue List: <span id="selected-cue-name">{{ current_cuelist_name }}</span>
            </div>
            <input id="script-file-input" type="file" accept=".txt,text/plain" class="hidden-file-input">
            <input id="cue-file-input" type="file" accept=".txt,text/plain" class="hidden-file-input">
        </div>
        <h1 id="app-title">Stage Manager Script Monitor</h1>
        <div class="header-right">
            <button id="monitor-toggle" type="button" class="monitor-toggle is-off" aria-pressed="false" title="Toggle monitoring">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a1 1 0 1 0-2 0 3 3 0 0 1-6 0 1 1 0 1 0-2 0 5 5 0 0 0 4 4.9V20H9a1 1 0 1 0 0 2h6a1 1 0 1 0 0-2h-2v-3.1A5 5 0 0 0 17 12z"/>
                </svg>
            </button>
        </div>
    </div>
</header>

<div id="top">
    <div class="card">
        <div class="card-header">Script</div>
        <div id="script" class="card-body">{{ script }}</div>
    </div>
    <div class="card">
        <div class="card-header">Live Monitor</div>
        <div id="transcript" class="card-body"></div>
    </div>
</div>

<div id="bottom">
    <div class="card reminders-card">
        <div class="card-header">Reminders</div>
        <div id="terminal" class="card-body"></div>
    </div>
    <div class="card cue-list-card">
        <div class="card-header">Cue List</div>
        <div id="cue-list" class="card-body">
            {% if cue_entries %}
                {% for cue in cue_entries %}
                    <div class="cue-item">{{ cue[0] }}: {{ cue[1] }}</div>
                {% endfor %}
            {% else %}
                <div class="cue-item">No cues loaded.</div>
            {% endif %}
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
<script id="cue-lookup-data" type="application/json">{{ cue_lookup|tojson }}</script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
